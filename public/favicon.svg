<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1560E8"/>
      <stop offset="100%" style="stop-color:#F5C518"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square — same as login logo -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Dumbbell — matches Icon name="dumbbell" in the app -->
  <!-- Bar -->
  <line x1="16" y1="32" x2="48" y2="32" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left collar -->
  <line x1="16" y1="26" x2="16" y2="38" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right collar -->
  <line x1="48" y1="26" x2="48" y2="38" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Left plate outer -->
  <line x1="10" y1="23" x2="10" y2="41" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Left plate inner -->
  <line x1="22" y1="25" x2="22" y2="39" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Right plate outer -->
  <line x1="54" y1="23" x2="54" y2="41" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Right plate inner -->
  <line x1="42" y1="25" x2="42" y2="39" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>